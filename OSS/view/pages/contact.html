{% extends 'layouts/base.html' %}
{% block content %}
<div class="container mx-auto px-4 py-12">
    <div class="max-w-lg mx-auto bg-white p-8 rounded-lg shadow-md border border-neutral-100">
        <h2 class="text-2xl font-bold text-green-700 mb-6 flex items-center gap-2">
            <i class="bi bi-envelope-paper-heart"></i> Liên hệ với GreenShop
        </h2>

        <form action="{% url 'contact_us' %}" method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-bold text-neutral-600 mb-2">Tên của ông/bà:</label>
                <input type="text" name="customer_name" class="w-full border rounded-lg px-4 py-2 outline-none focus:border-green-500" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-bold text-neutral-600 mb-2">Email để tôi phản hồi:</label>
                <input type="email" name="customer_email" class="w-full border rounded-lg px-4 py-2 outline-none focus:border-green-500" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-bold text-neutral-600 mb-2">Lời nhắn:</label>
                <textarea name="message" rows="4" class="w-full border rounded-lg px-4 py-2 outline-none focus:border-green-500" required></textarea>
            </div>
            <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">
                GỬI LỜI NHẮN
            </button>
        </form>
    </div>
</div>
{% endblock %}
