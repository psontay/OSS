<!-- CATEGORY -->
<div class="bg-white rounded-2xl shadow overflow-hidden" data-aos="fade-right" data-aos-duration="1000">
  <!-- HEADER -->
  <div
    class="bg-primary text-white font-bold px-4 py-3 flex items-center gap-2"
  >
    <i class="bi bi-filter-left"></i>
    Danh mục sản phẩm
  </div>

  <!-- LIST -->
  <div class="divide-y">
    <!-- ALL -->
    <a
      href="{% url 'product_list' %}"
      class="flex items-center justify-between px-4 py-3 transition {% if not selected_category %} bg-primary text-white {% else %} text-secondary hover:bg-green-50 {% endif %}"
    >
      Tất cả cây cảnh
    </a>

    {% for cat in categories %}
    <a
      href="{% url 'product_list_by_category' cat.slug %}"
      class="flex items-center justify-between px-4 py-3 transition {% if selected_category.id == cat.id %} bg-primary text-white {% else %} text-secondary hover:bg-green-50 {% endif %}"
    >
      <span>{{ cat.name }}</span>

      <span
        class="text-xs px-2 py-0.5 rounded-full {% if selected_category.id == cat.id %} bg-white text-primary {% else %} bg-gray-200 text-gray-600 {% endif %}"
      >
        {{ cat.plants.count }}
      </span>
    </a>
    {% endfor %}
  </div>
</div>

<!-- PH FILTER -->
<div class="bg-white rounded-2xl shadow mt-5 p-4" data-aos="fade-left" data-aos-duration="1000">
  <h6 class="font-bold text-primary mb-3 flex items-center gap-2">
    <i class="bi bi-droplet-half"></i>
    Lọc theo độ pH đất
  </h6>

  <form action="" method="get">
    <!-- RANGE -->
    <input
      type="range"
      name="ph"
      min="0"
      max="14"
      step="0.1"
      value="{{ current_ph|default:7.0 }}"
      oninput="this.nextElementSibling.value = this.value"
      class="w-full accent-green-600 cursor-pointer"
    />

    <!-- VALUE + BUTTON -->
    <div class="flex justify-between items-center mt-3">
      <span class="text-sm text-secondary/70">
        Giá trị:
        <output class="font-bold text-primary">
          {{ current_ph|default:7.0 }}
        </output>
      </span>

      <button
        type="submit"
        class="px-3 py-1.5 rounded-lg bg-primary text-white text-sm hover:bg-green-700 transition"
      >
        Lọc
      </button>
    </div>
  </form>

  <div class="mt-4 text-xs text-secondary/60 italic">
    * Hiển thị các loại cây có thể sinh trưởng tốt tại mức pH này.
  </div>
</div>
