{% extends 'layouts/base.html' %} 
{% load static %} 

{% block content %}
<div class="w-full px-4 mt-3 font-sans">
  <div class="flex flex-wrap -mx-4">
    <div data-aos="fade-up" data-aos-duration="1000" class="w-full md:w-1/3 px-4 mb-4 md:mb-0">
      <div class="block rounded-2xl bg-white shadow-sm border border-neutral-200 h-full flex flex-col overflow-hidden">
        
        <div class="p-4 border-b border-neutral-200 bg-neutral-50">
          <h6 class="mb-3 text-sm font-bold text-neutral-800 flex items-center gap-2">
            <i class="bi bi-geo-alt-fill text-green-600"></i> Vị trí của bạn:
          </h6>

          <div class="relative flex w-full items-stretch mb-2 shadow-sm rounded-lg overflow-hidden">
            <input
              type="text"
              id="start-address"
              class="relative m-0 block w-full min-w-0 flex-auto border border-r-0 border-neutral-300 bg-white px-3 py-2 text-sm text-neutral-700 outline-none transition duration-200 focus:border-green-500 focus:ring-1 focus:ring-green-500"
              placeholder="Nhập địa chỉ của bạn..."
            />
            <button
              class="z-[2] inline-block bg-green-600 px-4 py-2 text-xs font-bold uppercase text-white transition duration-150 hover:bg-green-700 focus:outline-none active:bg-green-800 shrink-0"
              onclick="searchStartLocation()"
            >
              Tìm
            </button>
          </div>

          <p class="text-xs text-neutral-500 mb-0">
            Hoặc: <b>Click chuột vào bản đồ</b> để chọn điểm xuất phát.
          </p>
        </div>
        <div class="p-4 bg-white border-b border-neutral-200">
          <label class="block text-xs font-bold text-neutral-700 mb-2">
            Bán kính tìm kiếm: <span id="radius-val" class="text-green-600">5</span> km
          </label>
          <input
                  type="range" id="radius-range" min="1" max="20" value="5"
                  class="w-full h-2 bg-neutral-200 rounded-lg appearance-none cursor-pointer accent-green-600"
                  oninput="updateRadius(this.value)"
          >
        </div>

        <div class="px-4 py-3 bg-green-600 text-white">
          <h5 class="mb-0 text-base font-bold flex items-center gap-2">
            <i class="bi bi-shop"></i> Danh sách Chi nhánh
          </h5>
        </div>

        <div class="p-0 flex-auto bg-white" style="height: 80vh; overflow-y: auto">
          <div class="flex w-full flex-col divide-y divide-neutral-100" id="branch-list"></div>
        </div>
      </div>
    </div>

    <div class="w-full md:w-2/3 px-4">
      <div data-aos="fade-left"
        data-aos-duration="1050"
        class="block rounded-2xl bg-white shadow-sm border border-neutral-200 h-full flex flex-col overflow-hidden p-1"
      >
        <div class="p-0 relative flex-auto rounded-xl overflow-hidden z-0">
          <div id="map" style="height: 80vh; width: 100%"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  /* Ẩn bảng chỉ đường mặc định hơi xấu của Leaflet Routing Machine */
  .leaflet-routing-container {
    display: none !important;
  }
  
  /* Tùy chỉnh Popup Leaflet cho mềm mại giống Tailwind */
  .leaflet-popup-content-wrapper {
      border-radius: 0.75rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      padding: 0;
  }
  .leaflet-popup-content {
      margin: 0;
  }
</style>
{% endblock %} 

{% block extra_js %}
<script>
  const branches = JSON.parse("{{ branches_json|escapejs }}");
  const map = L.map("map").setView([10.7626, 106.6602], 13);
  
  // ĐÃ SỬA LỖI 403: Chuyển sang bản đồ CartoDB Voyager
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">Carto</a>',
      maxZoom: 19
  }).addTo(map);

  let userLocation = null;
  let userMarker = null;
  let routingControl = null;
  const markers = [];

  const branchListEl = document.getElementById("branch-list");

  branches.forEach((branch, index) => {
    const marker = L.marker([branch.lat, branch.lng]).addTo(map);
    markers[index] = marker;

    // ĐÃ SỬA: Thay thế Bootstrap bằng Tailwind CSS cho Popup
    const popupContent = `
            <div class="p-4 w-[220px]">
                <h4 class="font-bold text-neutral-800 text-sm mb-1 m-0">${branch.name}</h4>
                <p class="text-[13px] text-neutral-600 mb-3 m-0 leading-relaxed">${branch.address}</p>
                <button class="w-full flex items-center justify-center gap-1.5 bg-green-600 hover:bg-green-700 text-white font-medium py-1.5 px-3 rounded-md text-xs transition duration-200" onclick="window.routeTo(${branch.lat}, ${branch.lng})">
                    <i class="bi bi-cursor-fill"></i> Chỉ đường tới đây
                </button>
            </div>
        `;
    marker.bindPopup(popupContent);

    // ĐÃ SỬA: Thay thế Bootstrap bằng Tailwind CSS cho Danh sách chi nhánh
    const listItem = document.createElement("a");
    listItem.className = "block px-4 py-3 cursor-pointer hover:bg-green-50 transition duration-200 border-l-4 border-transparent hover:border-green-600";
    listItem.innerHTML = `
            <div class="flex items-center mb-1">
                <i class="bi bi-shop text-green-600 mr-2 text-lg"></i>
                <h6 class="text-green-700 font-bold text-sm m-0">${branch.name}</h6>
            </div>
            <p class="text-neutral-500 text-xs m-0 pl-7 leading-relaxed">${branch.address}</p>
        `;

    listItem.onclick = () => {
      map.flyTo([branch.lat, branch.lng], 16);
      markers[index].openPopup();
    };
    branchListEl.appendChild(listItem);
  });

  function setStartPoint(latlng, label) {
    userLocation = latlng;
    if (userMarker) map.removeLayer(userMarker);
    
    // Đổi icon của User thành màu đỏ cho dễ phân biệt với các chi nhánh
    var redIcon = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    userMarker = L.marker(latlng, { draggable: true, icon: redIcon })
      .addTo(map)
      .bindPopup(`<div class="p-2 font-bold text-sm text-red-600">${label}</div>`)
      .openPopup();
    filterBranches();
  }

  map.on("click", function (e) {
    setStartPoint(e.latlng, "Điểm xuất phát của bạn");
  });

  window.searchStartLocation = function () {
    const addr = document.getElementById("start-address").value;
    if (!addr) return;
    
    // Gắn thêm 'Việt Nam' để tìm kiếm chuẩn xác hơn
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${addr}, Việt Nam`)
      .then((res) => res.json())
      .then((data) => {
        if (data.length > 0) {
          const res = {
            lat: parseFloat(data[0].lat),
            lng: parseFloat(data[0].lon),
          };
          map.setView([res.lat, res.lng], 15);
          setStartPoint(res, "Vị trí tìm thấy");
        } else {
          alert("Không tìm thấy địa chỉ! Hãy thử nhập rõ Quận/Huyện, Tỉnh/Thành.");
        }
      });
  };

  window.routeTo = function (destLat, destLng) {
    if (!userLocation) {
      alert("Vui lòng click vào bản đồ hoặc nhập địa chỉ để chọn điểm xuất phát trước!");
      return;
    }
    if (routingControl) map.removeControl(routingControl);

    if (typeof L.Routing !== "undefined") {
      routingControl = L.Routing.control({
        waypoints: [
          L.latLng(userLocation.lat, userLocation.lng),
          L.latLng(destLat, destLng),
        ],
        // Chỉnh màu đường đi thành màu xanh lá Tailwind (green-600)
        lineOptions: { styles: [{ color: "#16a34a", weight: 6, opacity: 0.8 }] },
        createMarker: function () {
          return null; // Không vẽ đè marker mặc định của routing
        },
        fitSelectedRoutes: true,
        show: false
      }).addTo(map);
    } else {
      alert("Lỗi: Thư viện chỉ đường chưa được tải!");
    }
  };

  // ban kinh

  let searchCircle = null; // Vòng tròn bán kính
  let currentRadius = 5000; // Mặc định 5km (đơn vị mét)

  // Hàm cập nhật khi kéo thanh trượt
  window.updateRadius = function(val) {
    document.getElementById('radius-val').innerText = val;
    currentRadius = val * 1000;
    if (userLocation) {
      filterBranches(); // Lọc lại ngay khi kéo
    }
  };

  function filterBranches() {
    if (!userLocation) return;

    // 1. Vẽ/Cập nhật vòng tròn trên map
    if (searchCircle) map.removeLayer(searchCircle);
    searchCircle = L.circle(userLocation, {
      radius: currentRadius,
      color: '#16a34a',
      fillColor: '#16a34a',
      fillOpacity: 0.1,
      weight: 1
    }).addTo(map);

    // 2. Lọc danh sách chi nhánh
    let count = 0;
    branchListEl.innerHTML = ""; // Xóa danh sách cũ

    branches.forEach((branch, index) => {
      const branchLatLng = L.latLng(branch.lat, branch.lng);
      const distance = map.distance(userLocation, branchLatLng); // Tính khoảng cách mét

      if (distance <= currentRadius) {
        // Hiện marker và thêm vào danh sách bên trái
        markers[index].addTo(map);
        renderBranchItem(branch, index, distance);
        count++;
      } else {
        // Ẩn marker nếu ngoài bán kính
        map.removeLayer(markers[index]);
      }
    });

    if (count === 0) {
      branchListEl.innerHTML = `<p class="p-4 text-xs text-neutral-500 text-center">Không có chi nhánh nào trong bán kính này.</p>`;
    }
  }

  // Hàm render item (tách ra từ vòng lặp cũ của ông cho sạch code)
  function renderBranchItem(branch, index, distance) {
    const distKm = (distance / 1000).toFixed(1);
    const listItem = document.createElement("a");
    listItem.className = "block px-4 py-3 cursor-pointer hover:bg-green-50 transition border-l-4 border-transparent hover:border-green-600";
    listItem.innerHTML = `
        <div class="flex justify-between items-start">
            <div>
                <h6 class="text-green-700 font-bold text-sm m-0">${branch.name}</h6>
                <p class="text-neutral-500 text-[11px] m-0 leading-relaxed">${branch.address}</p>
            </div>
            <span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">
                ${distKm} km
            </span>
        </div>
    `;
    listItem.onclick = () => {
      map.flyTo([branch.lat, branch.lng], 16);
      markers[index].openPopup();
    };
    branchListEl.appendChild(listItem);
  }
</script>
{% endblock %}
