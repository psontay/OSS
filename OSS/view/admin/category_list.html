{% extends 'admin/base_admin.html' %}

{% block title %}Quản lý Danh mục - GIS Admin{% endblock %}

{% block content %}
<div class="pt-6 pb-4 border-b border-gray-300 mb-6 flex justify-between items-center">
    <h1 class="text-3xl font-bold text-gray-800">Danh mục Cây cảnh</h1>
    <a href="{% url 'category_add' %}" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded inline-flex items-center transition">
        <i class="bi bi-plus-lg mr-2"></i> Thêm danh mục
    </a>
</div>

<div class="bg-white rounded-lg shadow-md overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-800 text-white text-sm uppercase tracking-wider">
                    <th class="px-6 py-4 font-semibold w-24">ID</th>
                    <th class="px-6 py-4 font-semibold">Tên Danh Mục</th>
                    <th class="px-6 py-4 font-semibold text-center w-48">Hành động</th>
                </tr>
            </thead>
            <tbody class="text-gray-700">
                {% for cat in categories %}
                <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                    <td class="px-6 py-4 font-medium text-gray-500">#{{ cat.id }}</td>
                    <td class="px-6 py-4 font-bold text-gray-800">{{ cat.name }}</td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex items-center justify-center space-x-2">
                            <a href="{% url 'category_edit' cat.id %}" class="text-blue-500 hover:text-blue-700 bg-blue-100 hover:bg-blue-200 p-2 rounded transition mr-2" title="Chỉnh sửa">
                                <i class="bi bi-pencil-square"></i>
                            </a>
                            <a href="{% url 'category_delete' cat.id %}" onclick="return confirm('Xóa danh mục này?');" class="text-red-500 hover:text-red-700 bg-red-100 hover:bg-red-200 p-2 rounded transition">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="px-6 py-8 text-center text-gray-500"><i class="bi bi-tags text-4xl block mb-2"></i> Chưa có danh mục nào.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
