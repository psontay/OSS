<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GIS Plant Shop{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #f4f4f4; }
        .navbar-custom { background-color: #1b5e20; } /* Màu xanh đậm chất cây cảnh */
        #map { height: 400px; width: 100%; border: 2px solid #ddd; }
        footer { background: #333; color: white; padding: 20px 0; margin-top: 40px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">GIS-CAYCANH</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'home' %}">Trang chủ</a>
                <a class="nav-link" href="{% url 'check_suitability' %}">Kiểm tra độ phù hợp</a>
                <a class="nav-link" href="{% url 'product_list' %}">Cửa hàng</a>
                <a class="nav-link btn btn-warning text-dark btn-sm ms-2" href="/admin">Admin GIS</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center">
        <div class="container">
            <p class="mb-0">Dự án GIS-Ecommerce</p>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
